services:
  backend:
    build: ./backend
    volumes :
      - ./backend:/api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - ./backend/.env
    ports :
      - "5433:5432"
    volumes :
      - "postgres_data:/var/lib/postgresql/data"

volumes :
   postgres_data :